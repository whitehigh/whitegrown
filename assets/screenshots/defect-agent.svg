  <rect x="72" y="454" width="776" height="42" rx="8" fill="#fef2f2" stroke="#fecaca"/>
  <text x="96" y="481" font-family="Arial, sans-serif" font-size="15" fill="#991b1b">核心能力：缺陷归纳、日志线索整理、人工确认、问题闭环</text>
