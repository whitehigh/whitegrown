<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-label="配置校验工具截图示意">
  <rect width="920" height="560" fill="#f8fafc"/>
  <rect x="44" y="38" width="832" height="484" rx="14" fill="#ffffff" stroke="#d8dee8"/>
  <text x="74" y="88" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#182230">游戏配置表校验工具</text>
  <text x="74" y="122" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Excel / CSV / SQL 配置数据 -> 规则校验 -> 风险报告</text>
  <rect x="74" y="164" width="772" height="260" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <line x1="74" y1="218" x2="846" y2="218" stroke="#cbd5e1"/>
  <line x1="250" y1="164" x2="250" y2="424" stroke="#cbd5e1"/>
  <line x1="430" y1="164" x2="430" y2="424" stroke="#cbd5e1"/>
  <line x1="610" y1="164" x2="610" y2="424" stroke="#cbd5e1"/>
  <text x="98" y="198" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">字段</text>
  <text x="274" y="198" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">规则</text>
  <text x="454" y="198" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">状态</text>
  <text x="634" y="198" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">风险</text>
  <text x="98" y="260" font-family="Arial, sans-serif" font-size="15" fill="#334155">price</text>
  <text x="274" y="260" font-family="Arial, sans-serif" font-size="15" fill="#334155">大于 0</text>
  <text x="454" y="260" font-family="Arial, sans-serif" font-size="15" fill="#16a34a">通过</text>
  <text x="634" y="260" font-family="Arial, sans-serif" font-size="15" fill="#334155">无</text>
  <text x="98" y="312" font-family="Arial, sans-serif" font-size="15" fill="#334155">reward_id</text>
  <text x="274" y="312" font-family="Arial, sans-serif" font-size="15" fill="#334155">关联奖励表</text>
  <text x="454" y="312" font-family="Arial, sans-serif" font-size="15" fill="#dc2626">失败</text>
  <text x="634" y="312" font-family="Arial, sans-serif" font-size="15" fill="#dc2626">奖励不存在</text>
  <text x="98" y="364" font-family="Arial, sans-serif" font-size="15" fill="#334155">region</text>
  <text x="274" y="364" font-family="Arial, sans-serif" font-size="15" fill="#334155">地区可用</text>
  <text x="454" y="364" font-family="Arial, sans-serif" font-size="15" fill="#f59e0b">警告</text>
  <text x="634" y="364" font-family="Arial, sans-serif" font-size="15" fill="#92400e">海外差异</text>
  <rect x="74" y="454" width="772" height="42" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="98" y="481" font-family="Arial, sans-serif" font-size="15" fill="#166534">核心能力：配置数据校验、规则引擎、SQL/Excel、上线风险识别</text>
</svg>
