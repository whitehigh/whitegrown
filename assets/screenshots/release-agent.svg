  <text x="74" y="122" font-family="Arial, sans-serif" font-size="16" fill="#64748b">版本发布前检查包体、资源、配置、回归结果和风险项</text>
  <rect x="82" y="168" width="756" height="250" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
