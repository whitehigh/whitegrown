<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-label="发布检查 Agent 截图示意">
  <rect width="920" height="560" fill="#f8fafc"/>
  <rect x="44" y="38" width="832" height="484" rx="14" fill="#ffffff" stroke="#d8dee8"/>
