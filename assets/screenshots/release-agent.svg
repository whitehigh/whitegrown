  <text x="158" y="228" font-family="Arial, sans-serif" font-size="17" fill="#334155">包体版本与渠道配置已确认</text>
  <circle cx="126" cy="274" r="14" fill="#22c55e"/>
  <path d="M119 274l5 5 10-12" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="158" y="280" font-family="Arial, sans-serif" font-size="17" fill="#334155">资源部署与热更清单已验证</text>
  <circle cx="126" cy="326" r="14" fill="#f59e0b"/>
  <text x="121" y="332" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">!</text>
  <text x="158" y="332" font-family="Arial, sans-serif" font-size="17" fill="#334155">海外地区配置存在差异，等待人工确认</text>
  <circle cx="126" cy="378" r="14" fill="#22c55e"/>
