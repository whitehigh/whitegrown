  <text x="158" y="384" font-family="Arial, sans-serif" font-size="17" fill="#334155">回归测试结果已归档</text>
  <rect x="82" y="454" width="756" height="42" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="106" y="481" font-family="Arial, sans-serif" font-size="15" fill="#1d4ed8">核心能力：Checklist、人工确认、发布风险控制、海外本地化 QA</text>
